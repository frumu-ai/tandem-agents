agent:
  name: ACA
  dry_run: false

tandem:
  base_url: http://localhost:39733
  token_env: TANDEM_API_TOKEN
  token_file: secrets/tandem_api_token
  engine_command: scripts/tandem-engine-serve.sh

task_source:
  type: kanban_board
  owner: ""
  repo: ""
  project: ""
  item: ""
  url: ""
  path: config/board.yaml
  prompt: ""
  source_name: ""
  card_id: ""

repository:
  path: ""
  slug: ""
  clone_url: ""
  default_branch: main
  worktree_root: ""
  remote_name: origin

provider:
  id: openai-codex
  model: gpt-5.5
  fallback_provider: ""
  fallback_model: ""

review:
  policy: human_review
  auto_merge_strategy: squash
  auto_merge_allowed_strategies: squash
  merge_requires_approval: true
  branch_delete_requires_approval: true
  delete_branch_after_merge: true

storage:
  profile: local

swarm:
  enabled: false
  shared_model: false
  max_workers: 3
  manager:
    provider: ""
    model: ""
  worker:
    provider: ""
    model: ""
  reviewer:
    provider: ""
    model: ""
  tester:
    provider: ""
    model: ""

output:
  root: runs
